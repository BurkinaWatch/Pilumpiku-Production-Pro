kind = "web"
previewPath = "/"
title = "Pilimpiku Production"
version = "1.0.0"
id = "artifacts/pilimpiku"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25338

[services.development]
run = "pnpm --filter @workspace/pilimpiku run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pilimpiku", "run", "build" ]
publicDir = "artifacts/pilimpiku/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25338"
BASE_PATH = "/"
